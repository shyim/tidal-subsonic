name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # The web SPA is prebuilt in a dedicated step; skip build.rs's frontend build.
  TIDAL_SUBSONIC_SKIP_WEB_BUILD: "1"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # The bundled SQLite and the LAME MP3 encoder (mp3lame-encoder builds LAME
      # via `cc`) both need a C compiler at build time.
      - name: Install C toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential pkg-config

      # The web portal SPA is built (once) here; build.rs then reuses it via
      # TIDAL_SUBSONIC_SKIP_WEB_BUILD so the Rust build stays JS-toolchain-free.
      - name: Set up Node + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build web portal
        working-directory: web
        run: |
          corepack enable
          pnpm install --frozen-lockfile || pnpm install
          node node_modules/vite/bin/vite.js build

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Advisory: report formatting drift without failing the build.
      - name: Format check
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --verbose

      # Clippy is advisory for now: surface lints without failing the build.
      - name: Clippy
        run: cargo clippy --all-targets -- -W clippy::all
        continue-on-error: true
