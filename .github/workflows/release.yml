name: Release

# Build and publish the multi-arch Docker image to GHCR using Docker's
# maintained reusable build workflow (docker/github-builder). It handles native
# multi-platform builds, provenance/SBOM attestations, and caching for us.
#
# Triggers & tags:
#   - push to main    -> `edge` + `main-<sha>`
#   - version tag v*  -> `latest` + `1.2.3` + `1.2`
#   - pull request    -> build only, no push
#   - manual dispatch
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker:
    uses: docker/github-builder/.github/workflows/build.yml@v1
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    with:
      output: image
      platforms: linux/amd64,linux/arm64
      push: ${{ github.event_name != 'pull_request' }}
      cache: true
      sbom: true
      meta-images: ghcr.io/${{ github.repository_owner }}/tidal-subsonic
      # docker/metadata-action tag syntax:
      #   - branch pushes  -> the branch name (main), plus a short-sha tag
      #   - `edge`         -> moves on every default-branch push
      #   - semver v1.2.3  -> 1.2.3 and 1.2
      #   - `latest`       -> only on a version tag
      meta-tags: |
        type=edge,branch=main
        type=ref,event=branch
        type=sha,prefix=main-,enable={{is_default_branch}}
        type=semver,pattern={{version}}
        type=semver,pattern={{major}}.{{minor}}
        type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
