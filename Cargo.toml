[package]
name = "tidal-subsonic"
version = "0.1.0"
edition = "2021"
description = "A Subsonic-compatible API server backed by Tidal"

[dependencies]
# Web framework
axum = "0.7"
tokio = { version = "1", features = ["full"] }
tower-http = { version = "0.5", features = ["cors"] }

# HTTP client for Tidal API
reqwest = { version = "0.11", features = ["json"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde-xml-rs = "0.6"

# Auth
md5 = "0.7"
sha2 = "0.10"
base64 = "0.21"
rand = "0.8"

# Config
toml = "0.8"
dirs = "5"

# Logging
tracing = "0.1"
tracing-subscriber = "0.3"

# URL handling
url = "2"

# XML parsing for DASH manifests
roxmltree = "0.20"

# Error handling
anyhow = "1"
