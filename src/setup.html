<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIDAL Subsonic Setup</title>
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  max-width: 600px;
  margin: 60px auto;
  padding: 20px;
  background: #0a0a0a;
  color: #eee;
}
h1 { color: #00d4aa; margin-bottom: 8px; }
.subtitle { color: #888; margin-bottom: 24px; }
.card {
  background: #1a1a1a;
  border-radius: 12px;
  padding: 24px;
  border: 1px solid #333;
  margin-bottom: 16px;
}
label {
  display: block;
  margin-bottom: 4px;
  font-weight: 500;
  color: #aaa;
  font-size: 14px;
}
input {
  width: 100%;
  padding: 12px;
  margin-bottom: 16px;
  background: #222;
  border: 1px solid #444;
  border-radius: 8px;
  color: #fff;
  font-size: 16px;
  box-sizing: border-box;
}
input:focus {
  outline: none;
  border-color: #00d4aa;
}
.btn {
  display: inline-block;
  background: #00d4aa;
  color: #000;
  padding: 14px 28px;
  border-radius: 8px;
  text-decoration: none;
  font-weight: bold;
  font-size: 16px;
  border: none;
  cursor: pointer;
  width: 100%;
  text-align: center;
}
.btn:hover { background: #00eebb; }
.info { color: #888; font-size: 14px; margin-top: 8px; }
.note {
  background: #1a2a24;
  border-left: 3px solid #00d4aa;
  padding: 12px 16px;
  border-radius: 6px;
  font-size: 14px;
  color: #aaa;
  margin-bottom: 16px;
}
</style>
</head>
<body>
<h1>🌊 TIDAL Subsonic</h1>
<p class="subtitle">Stream your TIDAL library through any Subsonic client</p>

<div class="card">
<form action="/authorize" method="GET">
  <label>Your Subsonic Username</label>
  <input type="text" name="subsonic_username" value="tidal" placeholder="Subsonic username" />

  <label>Your Subsonic Password</label>
  <input type="password" name="subsonic_password" value="tidal" placeholder="Subsonic password" />

  <button class="btn" type="submit">Login with TIDAL</button>
</form>
</div>

<div class="note">
  <b>💡 Tip:</b> Set a unique username and password for your Subsonic clients.
</div>
</body>
</html>
